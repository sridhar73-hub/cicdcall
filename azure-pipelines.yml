# Starter pipeline
# https://aka.ms/yaml

trigger:
- master

pool:
  name: 'Sritesting'

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

# Run your generic shell script (Testsigma execution)
- task: Bash@3
  displayName: 'Run Testsigma shell script'
  inputs:
    filePath: './runscript.sh'

# DEBUG: find where the JUnit report actually got written
- script: |
    echo "=== Working directory ==="
    pwd
    echo "=== System.DefaultWorkingDirectory ==="
    echo "$(System.DefaultWorkingDirectory)"
    echo "=== Agent.BuildDirectory ==="
    echo "$(Agent.BuildDirectory)"
    echo "=== Searching for xml/junit files under agent work dir ==="
    find "$(Agent.BuildDirectory)" -type f \( -name "*.xml" -o -name "junit*" \) 2>/dev/null || true
    exit 0
  displayName: 'DEBUG: locate junit report'
  condition: succeededOrFailed()

# Copy the JUnit report into the artifact staging directory
- task: CopyFiles@2
  displayName: 'Copy JUnit report to staging'
  condition: succeededOrFailed()
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)'
    Contents: '**/junit-report.xml'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'
    flattenFolders: true

# Publish the JUnit report as a pipeline artifact (downloadable from the run)
- task: PublishPipelineArtifact@1
  displayName: 'Publish Test Report Artifact'
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)'
    artifact: 'testsigma-results'
    publishLocation: 'pipeline'

# Publish the JUnit report so it shows up in the "Tests" tab of the run
- task: PublishTestResults@2
  displayName: 'Publish Testsigma Test Results'
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/junit-report.xml'
    searchFolder: '$(System.DefaultWorkingDirectory)'
    failTaskOnFailedTests: true

# Starter pipeline
# https://aka.ms/yaml

trigger:
- master

pool:
  name: 'Sritesting'

steps:
- script: echo Hello, world!
  displayName: 'Run a one-line script'

# Run your generic shell script
- task: Bash@3
  displayName: 'Run Testsigma shell script'
  inputs:
    filePath: './runscript.sh'

# Copy the JUnit report into the artifact staging directory
- task: CopyFiles@2
  displayName: 'Copy JUnit report to staging'
  condition: succeededOrFailed()
  inputs:
    SourceFolder: '$(System.DefaultWorkingDirectory)'
    Contents: 'junit-report.xml'
    TargetFolder: '$(Build.ArtifactStagingDirectory)'

# Publish the JUnit report as a pipeline artifact (downloadable from the run)
- task: PublishPipelineArtifact@1
  displayName: 'Publish Test Report Artifact'
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(Build.ArtifactStagingDirectory)'
    artifact: 'testsigma-results'
    publishLocation: 'pipeline'

# Publish the JUnit report so it shows up in the "Tests" tab of the run
- task: PublishTestResults@2
  displayName: 'Publish Testsigma Test Results'
  condition: succeededOrFailed()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: '**/junit-report.xml'
    searchFolder: '$(System.DefaultWorkingDirectory)'
    failTaskOnFailedTests: true
